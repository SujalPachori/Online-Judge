<!DOCTYPE html>
<html lang="en" class="bg-gray-900 text-gray-100">
  <head>
    <meta charset="UTF-8" />
    <title>All Problems</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  </head>
  <body class="min-h-screen flex justify-start bg-gray-900 text-gray-100">
    
    <!-- Main Content -->
    <main class="flex-1 p-6 md:px-10 max-w-4xl space-y-6">
      <header class="border-b border-gray-700 pb-4">
        <h1 class="text-3xl font-bold text-white">All Problems</h1>
      </header>

      <ul class="space-y-4">
        {% for problem in all_problems %}
        <li>
          <a 
            href="/problems/problem/{{ problem.id }}/"
            class="block p-4 rounded-lg bg-gray-800 hover:bg-gray-700 transition shadow border border-gray-700"
          >
            <span class="text-lg font-medium text-white">{{ problem.id }}. {{ problem.name }}</span>
          </a>
        </li>
        {% endfor %}
      </ul>
    </main>
    
  </body>
</html>
