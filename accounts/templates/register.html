<!DOCTYPE html>
<html lang="en" class="bg-gray-900 text-gray-100">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  </head>
  <body class="min-h-screen flex items-center justify-center bg-gray-900">
    <main class="w-full max-w-md bg-gray-800 rounded-xl shadow-lg px-8 py-8 space-y-6">
      <form method="post" enctype="multipart/form-data" class="space-y-5">
        {% csrf_token %}

        <!-- App Title -->
        <div class="text-center">
          <h1 class="text-3xl font-bold text-green-400">CodeShrine</h1>
        </div>

        <!-- Register Heading -->
        <div>
          <h2 class="text-xl font-semibold text-white">Register</h2>
          <hr class="border-gray-700 mt-1" />
        </div>

        <!-- Messages -->
        {% if messages %}
        <div class="bg-blue-600 text-white p-3 rounded-md">
          {% for message in messages %}
            <p>{{ message }}</p>
          {% endfor %}
        </div>
        {% endif %}

        <!-- Username -->
        <div>
          <label for="username" class="block font-medium mb-1">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter username"
            required
            class="w-full bg-gray-700 text-white border border-gray-600 rounded-md px-4 py-2.5 placeholder-gray-400 focus:ring-2 focus:ring-green-400 focus:outline-none"
          />
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block font-medium mb-1">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            required
            class="w-full bg-gray-700 text-white border border-gray-600 rounded-md px-4 py-2.5 placeholder-gray-400 focus:ring-2 focus:ring-green-400 focus:outline-none"
          />
        </div>

        <!-- Account Prompt -->
        <div class="text-sm text-gray-300">
          Already have an account?
          <a href="/auth/login/" class="text-green-400 hover:underline">Login</a>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-2.5 rounded-md transition"
        >
          Submit
        </button>
      </form>
    </main>
  </body>
</html>
